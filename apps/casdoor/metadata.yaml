apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: casdoor
spec:
  displayName: "Casdoor"
  description: "Open-source identity and access management (IAM) / Single-Sign-On (SSO) platform"
  icon: "https://raw.githubusercontent.com/casdoor/casdoor/master/web/src/assets/logo.png"
  category: "Security"
  website: "https://casdoor.org/"

  version: "3.106.0"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/casdoor"
    path: ./overlays/librepod

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain for cluster (Casdoor will be at casdoor.BASE_DOMAIN)"
        type: string
        example: "example.com"

  dependencies:
    required:
      - kind: IngressController
        description: "Traefik (provided by traefik app)"
      - kind: StorageClass
        description: "nfs-client (provided by nfs-provisioner app)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-casdoor
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "casdoor"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/casdoor
        ref:
          tag: "3.106.0"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-casdoor
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "casdoor"
      spec:
        dependsOn:
          - name: storage
          - name: traefik
        force: true
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-casdoor
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

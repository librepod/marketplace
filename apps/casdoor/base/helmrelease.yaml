apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: casdoor
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  chartRef:
    kind: OCIRepository
    name: casdoor-helm-charts
  # No inline values here: app.conf uses the chart's maintained defaults. The only
  # overrides — the SQLite DSN (upstream https://github.com/casdoor/casdoor-helm/issues/42,
  # written to the /data PVC) and runmode — are injected as env vars from the
  # casdoor-env ConfigMap in overlays/librepod. Casdoor overrides any app.conf
  # key with an env var of the same name.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: casdoor
spec:
  values:
    # Override app.conf keys via env vars (Casdoor supports per-key env override
    # of app.conf). Sourced from the casdoor-env ConfigMap in this overlay.
    #   - dataSourceName: chart default is a relative SQLite path (upstream
    #     https://github.com/casdoor/casdoor-helm/issues/42); write to the /data PVC.
    #   - runmode: chart default is "dev"; pin "prod" for this deployment.
    envFromConfigmap:
      - name: dataSourceName
        configmapName: casdoor-env
        key: dataSourceName
      - name: runmode
        configmapName: casdoor-env
        key: runmode

    extraVolumeMounts:
    - name: data
      mountPath: /data
    # - name: init-data
    #   mountPath: /init_data.json
    #   subPath: init_data.json

    extraVolumes:
    - name: data
      persistentVolumeClaim:
        claimName: casdoor-data
    # - name: init-data
    #   configMap:
    #     name: init-data

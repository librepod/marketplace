apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
spec:
  interval: 1h
  releaseName: open-webui
  targetNamespace: open-webui
  chart:
    spec:
      chart: open-webui
      version: "15.2.0"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: open-webui
      interval: 12h
  values:
    # See https://github.com/open-webui/helm-charts/blob/main/charts/open-webui/values.yaml

    ollama:
      enabled: false

    pipelines:
      enabled: false

    persistence:
      enabled: true
      existingClaim: "open-webui-pvc"

    workload:
      kind: "Deployment"

    # -------------------------------------------------------------------------
    # Custom CA certificate configuration
    # Mounts the LibrePod root CA and merges it with the system CA bundle
    # -------------------------------------------------------------------------
    volumes:
      - name: root-ca-cert
        configMap:
          name: step-certificates-certs
          items:
            - key: root_ca.crt
              path: root_ca.crt
      - name: merged-ca-bundle
        emptyDir: {}

    volumeMounts:
      initContainer:
        - name: root-ca-cert
          mountPath: /mnt/root-ca
          readOnly: true
        - name: merged-ca-bundle
          mountPath: /mnt/merged-ca
      container:
        - name: merged-ca-bundle
          mountPath: /etc/ssl/certs/ca-certificates.crt
          subPath: ca-certificates.crt
          readOnly: true

    # Init container to merge root CA with system CA bundle
    extraInitContainers:
      - name: merge-ca-bundle
        image: alpine:3.19
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -e
            echo "Merging LibrePod root CA with system CA bundle..."
            cat /etc/ssl/certs/ca-certificates.crt > /mnt/merged-ca/ca-certificates.crt
            echo "" >> /mnt/merged-ca/ca-certificates.crt
            echo "# LibrePod Root CA" >> /mnt/merged-ca/ca-certificates.crt
            cat /mnt/root-ca/root_ca.crt >> /mnt/merged-ca/ca-certificates.crt
            echo "CA bundle merged successfully!"
        volumeMounts:
          - name: root-ca-cert
            mountPath: /mnt/root-ca
            readOnly: true
          - name: merged-ca-bundle
            mountPath: /mnt/merged-ca

    extraEnvVars:
        # Set default connection for users and share admin models
      - name: BYPASS_MODEL_ACCESS_CONTROL
        value: "True"
      - name: WEBUI_SESSION_COOKIE_SECURE
        value: "True"  # Set to false if using HTTP
      - name: WEBUI_AUTH_COOKIE_SECURE
        value: "True"  # Set to false if using HTTP
      # Fixes the "Chunk too big" errors, see https://github.com/open-webui/open-webui/issues/17626
      - name: CHAT_STREAM_RESPONSE_CHUNK_MAX_BUFFER_SIZE
        value: "20971520"

      # Admin Account Creation
      - name: WEBUI_ADMIN_EMAIL
        value: admin@libre.pod
      - name: WEBUI_ADMIN_PASSWORD
        value: "123"
      - name: WEBUI_ADMIN_NAME
        value: System Administrator

      # LibrePod SSO configuration
      #
      # OIDC credentials are NOT committed: the casdoor-sso-controller
      # provisions them and writes Secret/open-webui-sso (keys
      # OAUTH_CLIENT_ID / OAUTH_CLIENT_SECRET / OPENID_PROVIDER_URL) in this
      # namespace from the SSOClient CR in this overlay. The HelmRelease may
      # install before that Secret exists; the pods then wait
      # (CreateContainerConfig) until the controller reconciles it — expected
      # on a fresh bootstrap and self-heals.
      - name: SSL_CERT_FILE
        value: /etc/ssl/certs/ca-certificates.crt
      - name: ENABLE_OAUTH_SIGNUP
        value: "True"
      - name: ENABLE_LOGIN_FORM
        value: "True"
      - name: DEFAULT_USER_ROLE
        value: user
      - name: OAUTH_CLIENT_ID
        valueFrom:
          secretKeyRef:
            name: open-webui-sso
            key: OAUTH_CLIENT_ID
      - name: OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: open-webui-sso
            key: OAUTH_CLIENT_SECRET
      # Required. OIDC well known URL, for example https://accounts.google.com/.well-known/openid-configuration
      - name: OPENID_PROVIDER_URL
        valueFrom:
          secretKeyRef:
            name: open-webui-sso
            key: OPENID_PROVIDER_URL
      - name: OAUTH_PROVIDER_NAME
        value: LibrePod SSO
      # OAUTH_SCOPES - Scopes to request. Defaults to openid email profile
      - name: OPENID_REDIRECT_URI
        value: https://open-webui.${BASE_DOMAIN:=libre.pod}/oauth/oidc/callback
      # The redirect URI configured in your OIDC application. This must be set to <open-webui>/oauth/oidc/callback
      - name: ENABLE_OAUTH_GROUP_MANAGEMENT
        value: "True"
      - name: ENABLE_OAUTH_GROUP_CREATION
        value: "True"
      - name: WEBUI_AUTH_SIGNOUT_REDIRECT_URL
        value: https://open-webui.${BASE_DOMAIN:=libre.pod}

# Bundled PostgreSQL 17 image with the vectorchord + pgvectors extensions, as
# shipped by Immich in their recommended docker-compose (`database` service).
# Immich v3 no longer bundles a database in its Helm chart, so it is provided
# here as a sibling Deployment, mirroring the compose architecture.
#
# CAVEAT — NFS: Immich's docs state "Network shares are not supported for the
# database". LibrePod's default storageClass is nfs-client. The fix-permissions
# initContainer below makes a best effort to chown the data dir to the postgres
# user; if the cluster's NFS export uses root-squash this will fail and postgres
# will need a local/block storageClass instead (override via patch-storage-class).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: immich
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: immich
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: immich
        app.kubernetes.io/component: postgres
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data && chmod 700 /var/lib/postgresql/data"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: ghcr.io/immich-app/postgres
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: immich-env
          # 128 MiB shared memory, matching compose's `shm_size: 128mb`.
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "immich"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: immich-postgres-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi

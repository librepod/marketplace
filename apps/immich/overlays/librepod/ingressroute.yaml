apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
spec:
  entryPoints:
  - web
  - websecure
  routes:
  - kind: Rule
    match: Host(`immich.${BASE_DOMAIN:=libre.pod}`)
    priority: 1
    # No oauth2-proxy forward-auth middlewares: Immich handles authentication
    # natively (local accounts, plus optional OIDC SSO configured in the Immich
    # admin UI after install — see metadata dependencies on casdoor).
    services:
    - name: immich-server
      port: 2283

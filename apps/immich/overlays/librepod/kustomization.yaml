apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: immich

resources:
- ../../base
- ingressroute.yaml

# Only the bundled postgres image is a plain container the overlay tags directly.
# The immich server / valkey images are managed by the Helm chart (image.tag in
# patch-helmrelease.yaml), not by this images transformer.
images:
- name: ghcr.io/immich-app/postgres
  newTag: 14-vectorchord0.4.3-pgvectors0.2.0

patches:
- path: ./patch-helmrelease.yaml
  target:
    kind: HelmRelease
# No target selector here: this patch file is multi-document (one PVC per doc),
# so each document self-identifies its PVC by metadata.name. A target selector
# is only allowed on single-document patches.
- path: ./patch-storage-class.yaml

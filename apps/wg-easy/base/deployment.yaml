apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-easy
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: wg-easy
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wg-easy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: wg-easy
        image: ghcr.io/wg-easy/wg-easy
        imagePullPolicy: IfNotPresent
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - SYS_MODULE
        envFrom:
        - configMapRef:
            name: wg-easy
        - secretRef:
            name: wg-easy-admin
        volumeMounts:
        - name: config
          mountPath: /etc/wireguard
        - name: tun
          mountPath: /dev/net/tun
        livenessProbe:
          tcpSocket:
            port: 51821
          initialDelaySeconds: 0
          failureThreshold: 3
          timeoutSeconds: 1
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 51821
          initialDelaySeconds: 0
          failureThreshold: 3
          timeoutSeconds: 1
          periodSeconds: 10
        startupProbe:
          tcpSocket:
            port: 51821
          initialDelaySeconds: 0
          failureThreshold: 30
          timeoutSeconds: 1
          periodSeconds: 5
        ports:
        - name: http
          containerPort: 51821
          protocol: TCP
        - name: wireguard
          containerPort: 51820
          protocol: UDP
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: wg-easy-config
      - name: tun
        hostPath:
          path: /dev/net/tun
          type: CharDevice
      - name: lib-modules
        hostPath:
          path: /lib/modules
          type: DirectoryOrCreate

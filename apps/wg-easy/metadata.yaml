apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: wg-easy
spec:
  displayName: "WG Easy"
  description: "WireGuard VPN with a web-based configuration UI for easy setup and management"
  icon: "https://raw.githubusercontent.com/wg-easy/wg-easy/master/src/assets/img/logo.png"
  category: "Network"
  website: "https://github.com/wg-easy/wg-easy"

  version: "15.3"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/wg-easy"
    path: ./overlays/librepod

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain for cluster (WG Easy web UI will be at wg-easy.BASE_DOMAIN)"
        type: string
        example: "example.com"
      - name: FRP_SERVER_ADDR
        description: "FRP server public address (WireGuard clients connect to this host)"
        type: string
        example: "vla1.libreport.ru"
    optional:
      - name: TZ
        description: "Timezone for the wg-easy server (IANA name, e.g. Europe/Moscow)"
        type: string
        default: "UTC"

  dependencies:
    required:
      - kind: IngressController
        description: "Traefik (provided by traefik app)"
      - kind: StorageClass
        description: "nfs-client (provided by nfs-provisioner app)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-wg-easy
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "wg-easy"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/wg-easy
        ref:
          tag: "15.3"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-wg-easy
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "wg-easy"
      spec:
        dependsOn:
          - name: traefik
          - name: storage
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-wg-easy
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
            FRP_SERVER_ADDR: "${FRP_SERVER_ADDR}"
            TZ: "${TZ}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

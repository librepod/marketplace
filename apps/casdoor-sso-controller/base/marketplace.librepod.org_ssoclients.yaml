---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: ssoclients.marketplace.librepod.org
spec:
  group: marketplace.librepod.org
  names:
    kind: SSOClient
    listKind: SSOClientList
    plural: ssoclients
    shortNames:
    - ssoc
    singular: ssoclient
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SSOClientSpec defines the desired Casdoor OIDC Application.
            properties:
              applicationOverrides:
                description: |-
                  ApplicationOverrides is a free-form JSON object shallow-merged onto the
                  Casdoor Application at provision time. Use it for Casdoor Application
                  properties the CR does not model explicitly — branding and display fields
                  such as logo, favicon, headerHtml, footerHtml, formOffset, themeData,
                  formBackgroundUrl. New Casdoor properties can be configured per SSOClient
                  by adding a key here, WITHOUT a CRD schema change or a controller release.

                  Controller-managed keys are protected and silently ignored if present:
                  name, clientId, clientSecret, organization, redirectUris, grantTypes,
                  tokenFormat, expireInHours, enableSignUp, displayName, title. The
                  controller stamps those last, so the controller-owned identity (name,
                  clientId, organization) and forced policy (enableSignUp=false) cannot be
                  desynced via an override. This is a controller-ownership boundary, NOT a
                  security boundary: other Casdoor fields — including security-relevant ones
                  like cert, providers, signinMethods, enablePassword, ipRestriction — pass
                  through verbatim. Treat the CR author as a trusted cluster operator.

                  Values are passed through verbatim; Casdoor validates them on apply and a
                  rejected value surfaces as a Failed phase. Two footguns remain: a
                  misspelled or unsupported field name is silently dropped by Casdoor (no
                  error) and, since the controller keeps requesting it, triggers an update on
                  every reconcile — check controller logs if a value does not stick. Removal
                  is additive-only: deleting a key here does NOT revert it in Casdoor (the
                  controller stores no last-applied snapshot); set the key explicitly to its
                  empty/zero value to clear it. Nested objects/arrays replace the whole
                  field (shallow merge, not deep merge).
                x-kubernetes-preserve-unknown-fields: true
              casdoorPolicy:
                description: CasdoorPolicy is "retain" (default) or "delete" on CR
                  deletion.
                enum:
                - retain
                - delete
                type: string
              clientId:
                type: string
                x-kubernetes-validations:
                - message: clientId is immutable once set
                  rule: self == oldSelf
              expireInHours:
                type: integer
              grantTypes:
                items:
                  type: string
                type: array
              organization:
                type: string
              output:
                properties:
                  keys:
                    properties:
                      clientId:
                        type: string
                      clientSecret:
                        type: string
                      issuer:
                        type: string
                    type: object
                  secretName:
                    type: string
                  secretNamespace:
                    type: string
                type: object
              redirectUris:
                items:
                  type: string
                type: array
              scopes:
                items:
                  type: string
                type: array
              tokenFormat:
                type: string
            required:
            - clientId
            - redirectUris
            type: object
          status:
            properties:
              clientId:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastReconcileTime:
                format: date-time
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                enum:
                - Pending
                - Provisioning
                - Ready
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

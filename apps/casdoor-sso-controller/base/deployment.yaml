apiVersion: apps/v1
kind: Deployment
metadata:
  name: casdoor-sso-controller
  namespace: casdoor-sso-controller
spec:
  replicas: 1
  # Recreate (not the default RollingUpdate): the bootstrap init container
  # mounts the RWO casdoor-sso-creds PVC and mints the access key on first
  # boot. A RollingUpdate surge would run two init containers against the same
  # PVC/key at once, racing the mint. Recreate guarantees one pod at a time.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: casdoor-sso-controller
  template:
    metadata:
      labels:
        app: casdoor-sso-controller
    spec:
      serviceAccountName: casdoor-sso-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: bootstrap
          image: ghcr.io/librepod/casdoor-sso-controller:0.2.0
          imagePullPolicy: IfNotPresent
          command: ["/manager", "bootstrap"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: casdoor-sso-controller
          volumeMounts:
            - name: creds
              mountPath: /creds
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
      containers:
        - name: manager
          image: ghcr.io/librepod/casdoor-sso-controller:0.2.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: casdoor-sso-controller
          env:
            - name: CASDOOR_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: casdoor-api-credentials
                  key: accessKey
            - name: CASDOOR_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: casdoor-api-credentials
                  key: accessSecret
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 256Mi }
      volumes:
        - name: creds
          persistentVolumeClaim:
            claimName: casdoor-sso-creds

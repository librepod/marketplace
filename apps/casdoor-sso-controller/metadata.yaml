apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: casdoor-sso-controller
spec:
  displayName: "Casdoor SSO Controller"
  description: "Auto-provisions Casdoor OIDC applications for native-SSO apps"
  category: "Security"
  website: "https://github.com/librepod/marketplace"

  version: "0.1.0"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/casdoor-sso-controller"
    path: ./overlays/librepod

  dependencies:
    required:
      - kind: SSOProvider
        description: "Casdoor (provided by casdoor app)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-casdoor-sso-controller
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "casdoor-sso-controller"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/casdoor-sso-controller
        ref:
          tag: "0.1.0"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-casdoor-sso-controller
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "casdoor-sso-controller"
      spec:
        dependsOn:
          - name: casdoor
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-casdoor-sso-controller
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

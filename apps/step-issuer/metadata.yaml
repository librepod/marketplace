apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: step-issuer
spec:
  displayName: "Step Issuer"
  description: "Cert-Manager issuer for Step CA certificate authority"
  icon: "https://smallstep.com/assets/images/step-icon.png"
  category: "Infrastructure"
  website: "https://smallstep.com/docs/step-ca/certmanager"

  version: "0.9.11"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/step-issuer"
    path: ./overlays/librepod

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain for cluster (used by certificate issuance)"
        type: string
        example: "example.com"

  dependencies:
    required:
      - kind: CertificateAuthority
        description: "step-certificates (provided by step-certificates app)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-step-issuer
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "step-issuer"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/step-issuer
        ref:
          tag: "0.9.11"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-step-issuer
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "step-issuer"
      spec:
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-step-issuer
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

# Full HelmRelease override using the fork OCI chart.
# Uses chartRef (OCIRepository) instead of spec.chart + HelmRepository because
# the fork chart is published as an OCI artifact, not a classic Helm repo.
#
# The image override is needed because the published chart's values.yaml still
# references the upstream image (ghcr.io/zufardhiyaulhaq/frp-operator:v0.7.0).
#
# TODO: Delete this file once upstream PR #17 is merged. The base/ HelmRelease
# (with patch-helmrelease.yaml) will take over using the upstream chart.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frp-operator
spec:
  interval: 12h
  install:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 2m
  upgrade:
    crds: CreateReplace
    strategy:
      name: RetryOnFailure
      retryInterval: 3m
  chartRef:
    kind: OCIRepository
    name: frp-operator-charts
  values:
    operator:
      image: ghcr.io/librepod/frp-operator
      tag: v0.0.0-pr.2

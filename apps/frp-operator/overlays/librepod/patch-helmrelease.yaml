# Patch to apply once upstream PR #17 is merged and released.
# This restores the standard spec.chart + HelmRepository pattern by overriding
# the base HelmRelease's chart version to one that includes the subdomain fix.
#
# Usage: uncomment the `patches` section in kustomization.yaml, then update
# the version below to the upstream release that includes PR #17.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frp-operator
spec:
  chart:
    spec:
      chart: frp-operator
      version: "1.5.0"  # TODO: bump to version with PR #17
      sourceRef:
        kind: HelmRepository
        name: frp-operator-charts
      interval: 12h

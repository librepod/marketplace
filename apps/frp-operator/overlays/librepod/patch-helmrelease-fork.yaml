apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: frp-operator
spec:
  # chartRef takes precedence over spec.chart — the base HelmRepository is ignored.
  # Fork chart with fix for https://github.com/zufardhiyaulhaq/frp-operator/pull/17
  # TODO: Revert to spec.chart.spec.sourceRef once the PR is merged.
  chartRef:
    apiVersion: source.toolkit.fluxcd.io/v1
    kind: OCIRepository
    name: frp-operator-charts
  # Override image since the published chart still references the upstream image.
  values:
    operator:
      image: ghcr.io/librepod/frp-operator
      tag: v0.7.0-librepod1

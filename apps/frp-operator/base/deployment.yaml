apiVersion: apps/v1
kind: Deployment
metadata:
  name: frp-operator
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: frp-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frp-operator
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: manager
        image: zufardhiyaulhaq/frp-operator
        args:
        - --leader-elect
        securityContext:
          allowPrivilegeEscalation: false
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      serviceAccountName: frp-operator
      terminationGracePeriodSeconds: 10

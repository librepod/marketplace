apiVersion: v1
kind: Service
metadata:
  name: rustdesk-server-oss-hbbs
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: hbbs
  ports:
    - name: nat-test
      port: 21115
      targetPort: 21115
      protocol: TCP
    - name: id-tcp
      port: 21116
      targetPort: 21116
      protocol: TCP
    - name: id-udp
      port: 21116
      targetPort: 21116
      protocol: UDP
    - name: webclient
      port: 21118
      targetPort: 21118
      protocol: TCP

# Single pod running both RustDesk server components as two containers.
# They share the pod network namespace but bind disjoint ports
# (hbbs: 21115/21116/21118, hbbr: 21117/21119), so a single Service can
# expose every canonical port on one ClusterIP. This lets RustDesk clients
# enter a single ID-server address; the relay is auto-discovered at the
# same host on :21117 (which is hbbr here).
#
# No hostNetwork: the pod lives on the normal pod network and is reached
# via the tailnet (Tailscale/Headscale subnet routing advertising the
# cluster Service CIDR).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustdesk-server-oss
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  template:
    spec:
      containers:
        - name: hbbs
          image: rustdesk/rustdesk-server
          imagePullPolicy: IfNotPresent
          args:
            - hbbs
          envFrom:
            - configMapRef:
                name: rustdesk-server-oss
          ports:
            - name: nat-test
              containerPort: 21115
              protocol: TCP
            - name: id-tcp
              containerPort: 21116
              protocol: TCP
            - name: id-udp
              containerPort: 21116
              protocol: UDP
            - name: webclient
              containerPort: 21118
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 21116
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: 21116
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          startupProbe:
            tcpSocket:
              port: 21116
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 1
          volumeMounts:
            - name: hbbs-data
              mountPath: /root
        - name: hbbr
          image: rustdesk/rustdesk-server
          imagePullPolicy: IfNotPresent
          args:
            - hbbr
          envFrom:
            - configMapRef:
                name: rustdesk-server-oss
          ports:
            - name: relay
              containerPort: 21117
              protocol: TCP
            - name: webclient-relay
              containerPort: 21119
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 21117
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          readinessProbe:
            tcpSocket:
              port: 21117
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 1
          startupProbe:
            tcpSocket:
              port: 21117
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 1
          volumeMounts:
            - name: hbbr-data
              mountPath: /root
      volumes:
        - name: hbbs-data
          persistentVolumeClaim:
            claimName: rustdesk-server-oss-hbbs
        - name: hbbr-data
          persistentVolumeClaim:
            claimName: rustdesk-server-oss-hbbr

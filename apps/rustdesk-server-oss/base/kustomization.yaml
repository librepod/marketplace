apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rustdesk-server-oss

# includeSelectors injects app.kubernetes.io/name into the Deployment
# selector, pod template labels, and Service selector. With a single
# Deployment that is all the wiring needed (cf. headscale).
labels:
- includeSelectors: true
  includeTemplates: true
  pairs:
    app.kubernetes.io/name: rustdesk-server-oss

configMapGenerator:
- name: rustdesk-server-oss
  envs:
  - rustdesk-server-oss.env

resources:
- namespace.yaml
- pvc.yaml
- service.yaml
- deployment.yaml

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rustdesk-server-oss

# NOTE: includeSelectors adds app.kubernetes.io/name to every selector and
# template label. The two Deployments/Services additionally carry a distinct
# app.kubernetes.io/component label so each selects only its own pods.
labels:
- includeSelectors: true
  includeTemplates: true
  pairs:
    app.kubernetes.io/name: rustdesk-server-oss

configMapGenerator:
- name: rustdesk-server-oss
  envs:
  - rustdesk-server-oss.env

resources:
- namespace.yaml
- pvc.yaml
- service-hbbs.yaml
- service-hbbr.yaml
- deployment-hbbs.yaml
- deployment-hbbr.yaml

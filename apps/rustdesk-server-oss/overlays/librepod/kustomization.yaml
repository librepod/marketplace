apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rustdesk-server-oss

resources:
- ../../base

images:
- name: rustdesk/rustdesk-server
  newTag: "1.1.15"

# patch-storage-class.yaml is a multi-document file (one patch per PVC).
# Per the repo convention, multi-doc patch files must NOT set a `target:`
# selector here — each document matches its PVC by name automatically.
patches:
- path: patch-storage-class.yaml

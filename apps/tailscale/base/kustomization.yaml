apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tailscale

labels:
  - includeSelectors: true
    includeTemplates: true
    pairs:
      app.kubernetes.io/name: tailscale

configMapGenerator:
  - name: tailscale-env
    envs:
      - tailscale.env

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - pvc.yaml
  - deployment.yaml

# FRP tunnel upstreams for Headscale — expose the control server and embedded
# DERP STUN endpoint publicly so Tailscale clients can join the tailnet without
# first being connected to the WireGuard VPN.
#
# These Upstream resources are reconciled by frp-operator into the running
# FRP client configuration.  The FRP client (librepod-dev) connects to the
# relay server and tunnels traffic back to these local endpoints.
#
# DNS: The FRP server has subDomainHost = "vla1.libreport.ru" with wildcard
# DNS.  frp-operator auto-injects subdomain = "headscale" from the Upstream
# name, so the proxy is reachable at headscale.vla1.libreport.ru.
# headscale's server_url must point to the public FRP domain.
#
# TLS: A reverse proxy (Caddy/Nginx) on the FRP server terminates HTTPS on
# port 443 and forwards to frps vhostHTTPPort (80).  The domain cert must
# match headscale's server_url.

---
apiVersion: frp.zufardhiyaulhaq.com/v1alpha1
kind: Upstream
metadata:
  name: headscale-http
spec:
  client: librepod
  http:
    host: headscale.headscale.svc.cluster.local
    port: 80
    # With frps subDomainHost = "vla1.libreport.ru" and subdomain = "headscale",
    # the proxy resolves at headscale.vla1.libreport.ru (wildcard DNS).
    # customDomains is NOT used because frps rejects domains that overlap
    # with subDomainHost — subdomain is the correct mechanism.
    subdomain: headscale
    healthCheck:
      type: http
      path: /health
      timeoutSeconds: 3
      intervalSeconds: 10
      maxFailed: 3
    transport:
      useEncryption: true
      useCompression: true

---
apiVersion: frp.zufardhiyaulhaq.com/v1alpha1
kind: Upstream
metadata:
  name: headscale-https
spec:
  client: librepod
  https:
    host: headscale.headscale.svc.cluster.local
    port: 443
    # With frps subDomainHost = "vla1.libreport.ru" and subdomain = "headscale",
    # the proxy resolves at headscale.vla1.libreport.ru (wildcard DNS).
    # customDomains is NOT used because frps rejects domains that overlap
    # with subDomainHost — subdomain is the correct mechanism.
    subdomain: headscale
    proxyProtocol: v2
    transport:
      useEncryption: true
      useCompression: true

---
apiVersion: frp.zufardhiyaulhaq.com/v1alpha1
kind: Upstream
metadata:
  name: headscale-derp-stun
spec:
  client: librepod
  udp:
    # DERP STUN has no Kubernetes Service — reach it on the node's host network
    # where headscale binds 0.0.0.0:3478 via hostNetwork: true.
    host: 192.168.2.180
    port: 3478
    server:
      port: 8031

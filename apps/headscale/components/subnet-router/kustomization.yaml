apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Tailscale subnet router — optional component for the headscale app.
# Advertises k8s service CIDR and LAN subnet routes so Tailscale clients
# can reach internal services (CoreDNS, Traefik, NFS, etc), replicating
# the full LAN access that wg-easy's WireGuard VPN provides.
#
# Prerequisites:
#   1. Set the following variables in the cluster's FluxCD Kustomization
#      postBuild.substitute:
#        SERVICE_CIDR  — Kubernetes service CIDR (default: 10.43.0.0/16 for k3s)
#        LAN_SUBNETS   — Comma-separated LAN subnets to advertise
#                        (e.g. 192.168.2.0/24 or 192.168.2.0/24,10.10.0.0/24)
#   2. Create a pre-auth key in headscale:
#        headscale preauthkeys create --user <ID> --reusable --expiration 90d
#   3. Create a Kubernetes Secret with the key:
#        kubectl create secret generic tailscale-subnet-router-auth \
#          --from-literal=authkey=hskey-auth-...
#   4. Approve the advertised routes after the node registers:
#        headscale nodes approve-routes --identifier <ID> --routes=<SERVICE_CIDR>,<LAN_SUBNETS>
#
# Usage in an overlay kustomization.yaml:
#   components:
#     - ../../components/subnet-router

resources:
  - serviceaccount.yaml
  - role.yaml
  - rolebinding.yaml
  - deployment.yaml

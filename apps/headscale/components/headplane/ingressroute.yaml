# Headplane IngressRoute — serves the web UI from its own subdomain.
# Previously served under /admin on the headscale domain, now at headplane.${BASE_DOMAIN}.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: headplane
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`headplane.${BASE_DOMAIN:=libre.pod}`)
      services:
        - name: headplane
          port: 80

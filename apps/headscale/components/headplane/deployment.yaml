apiVersion: apps/v1
kind: Deployment
metadata:
  name: headplane
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headplane
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headplane
    spec:
      initContainers:
        # Generates a 32-character random cookie secret on first boot.
        # Only writes if the file doesn't exist yet (preserves value across pod restarts).
        - name: generate-cookie-secret
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              if [ ! -s /var/lib/headplane/cookie_secret ]; then
                head -c 24 /dev/urandom | base64 | head -c 32 > /var/lib/headplane/cookie_secret
                echo "Generated new cookie secret"
              else
                echo "Cookie secret already exists, keeping it"
              fi
          volumeMounts:
            - name: data
              mountPath: /var/lib/headplane
      containers:
        - name: headplane
          image: ghcr.io/tale/headplane
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            # Headplane's own config file.
            - name: config
              mountPath: /etc/headplane/config.yaml
              subPath: config.yaml
            # Persistent storage for internal database, cache, and cookie secret.
            - name: data
              mountPath: /var/lib/headplane
            # Shared Headscale config (read-only) for network/settings view in UI.
            - name: headscale-config
              mountPath: /etc/headscale/config.yaml
              subPath: config.yaml
              readOnly: true
          # Headplane has no HTTP health endpoint — use TCP socket probes.
          # The image includes /bin/hp_healthcheck for Docker HEALTHCHECK,
          # but TCP probes are simpler and don't require knowing the exact URL.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
            periodSeconds: 10
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 0
            failureThreshold: 30
            timeoutSeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: headplane-config
        - name: data
          persistentVolumeClaim:
            claimName: headplane-data
        # References the headscale ConfigMap from the base layer (same namespace).
        - name: headscale-config
          configMap:
            name: headscale-config

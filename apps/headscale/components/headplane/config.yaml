# Headplane configuration
#
# Default config: https://github.com/tale/headplane/blob/main/config.example.yaml
#
# Variables like ${BASE_DOMAIN} are substituted by FluxCD postBuild.substitute.
# For local testing: export BASE_DOMAIN=libre.pod && kustomize build ... | envsubst

server:
  host: "0.0.0.0"
  port: 3000
  # External URL (without /admin prefix) — used for OIDC callbacks and cookie domain.
  base_url: "https://headscale.${BASE_DOMAIN:=libre.pod}"
  # Session cookie secret — auto-generated by initContainer on first boot.
  # Stored on the persistent data volume so it survives pod restarts.
  cookie_secret_path: "/var/lib/headplane/cookie_secret"
  cookie_secure: true
  cookie_max_age: 86400
  # Persistent storage for Headplane's internal database and cache.
  data_path: "/var/lib/headplane"

headscale:
  # Internal Kubernetes service URL (same namespace).
  url: "http://headscale:80"
  # Public URL shown in the UI for user-facing links.
  public_url: "https://headscale.${FRP_DOMAIN:=libre.pod}"
  # Read-only access to the Headscale config file (shared ConfigMap from base).
  config_path: "/etc/headscale/config.yaml"
  config_strict: true


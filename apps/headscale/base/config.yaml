# Headscale configuration
# Variables like ${BASE_DOMAIN} are substituted by FluxCD postBuild.substitute
# For local testing: export BASE_DOMAIN=libre.pod && kustomize build ... | envsubst

server_url: https://headscale.${BASE_DOMAIN}
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090
grpc_listen_addr: 0.0.0.0:50443
grpc_allow_insecure: false

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

derp:
  server:
    enabled: true
    region_id: 999
    region_code: "headscale"
    region_name: "Headscale Embedded DERP"
    stun_listen_addr: "0.0.0.0:3478"
    private_key_path: /var/lib/headscale/derp_server_private.key
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

disable_check_updates: true

database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite
    write_ahead_log: true

dns:
  magic_dns: true
  # Must be DIFFERENT from server_url domain — headscale enforces this so DERP/DNS routing works.
  # MagicDNS hostnames will be: <hostname>.ts.${BASE_DOMAIN}
  base_domain: ts.${BASE_DOMAIN}
  nameservers:
    global:
      - 1.1.1.1

unix_socket: /var/run/headscale/headscale.sock

log:
  level: info
  format: text

# OIDC single sign-on (native headscale support — no oauth2-proxy needed).
# Disabled for initial verification — re-enable after registering Casdoor client
# and mounting step-ca root CA for TLS trust.
# oidc:
#   issuer: https://sso.${BASE_DOMAIN}
#   client_id: ${OIDC_CLIENT_ID}
#   client_secret: ${OIDC_CLIENT_SECRET}
#   scope: ["openid", "profile", "email"]

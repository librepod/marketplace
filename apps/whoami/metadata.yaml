apiVersion: marketplace/v1
kind: AppDefinition
metadata:
  name: whoami
spec:
  displayName: "Whoami"
  description: "Simple echo server for testing ingress and network connectivity"
  icon: "https://traefik.io/static/img/logo-traefik.svg"
  category: "Testing"
  website: "https://github.com/traefik/whoami"

  version: "v1.11.0"

  source:
    type: oci-kustomize
    url: "oci://ghcr.io/librepod/marketplace/apps/whoami"
    path: ./overlays/librepod

  params:
    required:
      - name: BASE_DOMAIN
        description: "Base domain for cluster (Whoami will be at whoami.BASE_DOMAIN)"
        type: string
        example: "example.com"

  dependencies:
    required:
      - kind: IngressController
        description: "Traefik (provided by traefik app)"

  templates:
    source: |
      apiVersion: source.toolkit.fluxcd.io/v1
      kind: OCIRepository
      metadata:
        name: marketplace-whoami
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "whoami"
      spec:
        interval: 10m
        url: oci://ghcr.io/librepod/marketplace/apps/whoami
        ref:
          tag: "v1.11.0"
    release: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: marketplace-whoami
        namespace: flux-system
        labels:
          marketplace.io/managed: "true"
          marketplace.io/app: "whoami"
      spec:
        interval: 1h
        retryInterval: 2m
        timeout: 5m
        sourceRef:
          kind: OCIRepository
          name: marketplace-whoami
        path: ./overlays/librepod
        prune: true
        wait: true
        postBuild:
          substitute:
            BASE_DOMAIN: "${BASE_DOMAIN}"
    kustomization: |
      apiVersion: kustomize.config.k8s.io/v1beta1
      kind: Kustomization
      resources:
        - source.yaml
        - release.yaml

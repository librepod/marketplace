apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: frpc
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/librepod/marketplace/apps/frpc
  ref:
    tag: "v0.65.0"
  verify:
    provider: cosign
    secretRef:
      name: cosign-pub
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: frpc
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: frpc
  path: ./overlays/librepod
  prune: true
  wait: false

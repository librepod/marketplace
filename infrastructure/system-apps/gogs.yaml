apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: gogs
  namespace: flux-system
spec:
  interval: 10m
  url: oci://ghcr.io/librepod/marketplace/apps/gogs
  ignore: |
    # FluxCD source-controller excludes *.zip files by default when extracting OCI artifacts.
    # We need gogs-init.zip for configMapGenerator to embed binary backup data.
    # This override explicitly includes zip files along with the required directories.
    /*
    !/*.zip
    !/base
    !/components
    !/overlays
    !/metadata.yaml
  ref:
    tag: "next-0.14"
  verify:
    provider: cosign
    secretRef:
      name: cosign-pub
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: gogs
  namespace: flux-system
spec:
  dependsOn:
    - name: storage
    - name: traefik
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: gogs
  path: ./overlays/librepod
  prune: true
  wait: true
  postBuild:
    substitute:
      BASE_DOMAIN: "${BASE_DOMAIN}"

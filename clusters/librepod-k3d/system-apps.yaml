# System Apps — core infrastructure required for cluster to function.
# Deployed by Flux from the bootstrap OCI artifact.
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: system-apps
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: OCIRepository
    name: librepod-bootstrap
  path: ./infrastructure/system-apps
  prune: true
  patches:
    # k3d uses local-path storage, skip NFS provisioner entirely
    - patch: |-
        $patch: delete
        apiVersion: source.toolkit.fluxcd.io/v1
        kind: OCIRepository
        metadata:
          name: storage
          namespace: flux-system
    - patch: |-
        $patch: delete
        apiVersion: kustomize.toolkit.fluxcd.io/v1
        kind: Kustomization
        metadata:
          name: storage
          namespace: flux-system

    # Explicit CRD dependency ordering — avoids dry-run failures + retry cycles
    # traefik contains Certificate CRs (needs cert-manager CRDs)
    - target:
        name: traefik
        kind: Kustomization
      patch: |
        - op: add
          path: /spec/dependsOn
          value:
            - name: cert-manager
        - op: replace
          path: /spec/timeout
          value: 10m
    # step-certificates contains IngressRoute CRs but cannot dependOn traefik
    # because traefik's health check needs the StepClusterIssuer from step-issuer,
    # which depends on step-certificates — creating a circular dependency.
    # Instead, step-certificates will retry on dry-run failure until traefik CRDs are registered.
    - target:
        name: step-certificates
        kind: Kustomization
      patch: |
        - op: remove
          path: /spec/dependsOn

    # Remove dependsOn: storage — storage is pre-provisioned via bootstrap
    - target:
        name: gogs
        kind: Kustomization
      patch: |
        - op: replace
          path: /spec/dependsOn
          value:
            - name: traefik
    - target:
        name: casdoor
        kind: Kustomization
      patch: |
        - op: replace
          path: /spec/dependsOn
          value:
            - name: traefik

    # Faster retries for dev cluster (production keeps 2m)
    - target:
        kind: Kustomization
      patch: |
        - op: replace
          path: /spec/retryInterval
          value: 30s
  postBuild:
    substitute:
      BASE_DOMAIN: "librepod.local"

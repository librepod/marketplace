name: Publish App Artifacts

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Apps to publish (JSON array, e.g. ["traefik","wg-easy"]). Use ["all"] to publish all apps.'
        required: false
        default: ''
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]
    paths:
      - 'apps/*/metadata.yaml'
      - 'apps/*/base/**'
      - 'apps/*/overlays/**'
      - 'apps/*/components/**'
  push:
    branches: [master]
    paths:
      - 'apps/*/metadata.yaml'
      - 'apps/*/base/**'
      - 'apps/*/overlays/**'
      - 'apps/*/components/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || (github.event_name == 'push' && 2 || 1) }}

      - id: changes
        env:
          MANUAL_APPS: ${{ inputs.apps }}
        run: |
          discover_all_apps() {
            # Find all apps with metadata.yaml
            APPS="[]"
            for metadata in apps/*/metadata.yaml; do
              app=$(dirname "$metadata" | xargs basename)
              APPS=$(echo "$APPS" | jq --arg a "$app" '. + [$a]')
            done
            echo "$APPS"
          }

          # Use manual input if provided (workflow_dispatch)
          if [ -n "$MANUAL_APPS" ]; then
            # Check for "all" magic value
            if echo "$MANUAL_APPS" | jq -e '. == ["all"]' > /dev/null 2>&1; then
              APPS=$(discover_all_apps)
            else
              APPS="$MANUAL_APPS"
            fi
          else
            # Determine diff base depending on event type
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              BASE="${{ github.event.pull_request.base.sha }}"
            else
              BASE="HEAD~1"
            fi

            # Get changed app directories from git diff
            CHANGED=$(git diff --name-only "${BASE}" HEAD -- 'apps/' \
              | cut -d'/' -f2 | sort -u)

            # Filter to apps with metadata.yaml (all publishable apps)
            APPS="[]"
            for app in $CHANGED; do
              # Must have metadata.yaml
              if [ ! -f "apps/$app/metadata.yaml" ]; then
                continue
              fi
              APPS=$(echo "$APPS" | jq --arg a "$app" '. + [$a]')
            done
          fi

          # Use jq -c to output compact (single-line) JSON for GITHUB_OUTPUT
          echo "apps=$(echo "$APPS" | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "Apps to publish: $APPS"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    strategy:
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v6

      - uses: fluxcd/flux2/action@main

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'version:' apps/${{ matrix.app }}/metadata.yaml \
            | head -1 | sed 's/.*version: *//' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push and sign app artifact
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
            echo "Pushing PR artifact: ${TAG}"
            DIGEST=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/${{ matrix.app }}:${TAG} \
              --path=./apps/${{ matrix.app }} \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --ignore-paths=.git/,.gitignore,.gitmodules,.gitattributes,*.jpg,*.jpeg,*.gif,*.png,*.wmv,*.flv,*.tar.gz \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing PR artifact (keyless): $DIGEST"
            cosign sign --yes "$DIGEST"
          else
            # Note: flux push artifact ignores *.zip by default, but we need zip files
            # for configMapGenerator to embed binary data (e.g., gogs-init.zip)

            echo "Pushing versioned artifact and capture its digest..."
            DIGEST_V=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/${{ matrix.app }}:${{ steps.version.outputs.version }} \
              --path=./apps/${{ matrix.app }} \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --ignore-paths=.git/,.gitignore,.gitmodules,.gitattributes,*.jpg,*.jpeg,*.gif,*.png,*.wmv,*.flv,*.tar.gz \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing versioned artifact by digest: $DIGEST_V"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_V"

            echo "Pushing latest artifact and capture its digest..."
            DIGEST_L=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/${{ matrix.app }}:latest \
              --path=./apps/${{ matrix.app }} \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --ignore-paths=.git/,.gitignore,.gitmodules,.gitattributes,*.jpg,*.jpeg,*.gif,*.png,*.wmv,*.flv,*.tar.gz \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing latest artifact by digest: $DIGEST_L"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_L"
          fi

  comment:
    needs: [detect-changes, publish]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.apps != '[]'
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const tag = `pr-${pr_number}`;
            const owner = context.repo.owner;
            const apps = JSON.parse(process.env.APPS);

            let appRows = apps.map(app =>
              `| \`${app}\` | \`ghcr.io/${owner}/marketplace/apps/${app}:${tag}\` |`
            ).join('\n');

            const body = `### PR App Artifacts Ready

            | App | Tag |
            |-----|-----|
            ${appRows}

            \`\`\`bash
            # Test in dev cluster:
            flux reconcile source oci <name> --tag ${tag}
            \`\`\``;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr_number,
              body
            });
        env:
          APPS: ${{ needs.detect-changes.outputs.apps }}

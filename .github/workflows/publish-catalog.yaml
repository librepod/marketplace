name: Publish Catalog

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Publish App Artifacts"]
    types: [completed]
  push:
    branches: [master]
    paths:
      - 'apps/*/metadata.yaml'
      - 'scripts/generate-catalog.sh'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate catalog
        run: ./scripts/generate-catalog.sh

      - name: Commit catalog if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet catalog.yaml apps/marketplace-ui/base/catalog.yaml; then
            echo "No catalog changes"
          else
            git add catalog.yaml apps/marketplace-ui/base/catalog.yaml
            git commit -m "chore: regenerate catalog.yaml"
            git push
          fi

      - uses: fluxcd/flux2/action@main

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Push and sign catalog artifact
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          DATE=$(date -u +%Y%m%d)

          echo "Pushing dated artifact and capture its digest..."
          DIGEST_D=$(flux push artifact \
            oci://ghcr.io/${{ github.repository_owner }}/marketplace/catalog:${DATE} \
            --path=./catalog.yaml \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git rev-parse HEAD)" \
            --output json | jq -r '.repository + "@" + .digest')

          echo "Signing dated artifact by digest: $DIGEST_D"
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_D"

          echo "Pushing latest artifact and capture its digest..."
          DIGEST_L=$(flux push artifact \
            oci://ghcr.io/${{ github.repository_owner }}/marketplace/catalog:latest \
            --path=./catalog.yaml \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git rev-parse HEAD)" \
            --output json | jq -r '.repository + "@" + .digest')

          echo "Signing latest artifact by digest: $DIGEST_L"
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_L"

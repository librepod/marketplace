name: Publish Marketplace UI

on:
  push:
    branches: [master]
    paths:
      - 'ui/**'
      - 'apps/marketplace-ui/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]
    paths:
      - 'ui/**'
      - 'apps/marketplace-ui/**'
  workflow_dispatch:

jobs:
  publish-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
            docker buildx build --push \
              -t ghcr.io/librepod/marketplace-ui:${TAG} \
              ./ui
          else
            docker buildx build --push \
              -t ghcr.io/librepod/marketplace-ui:latest \
              -t ghcr.io/librepod/marketplace-ui:${{ github.sha }} \
              ./ui
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Sign Docker image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
            DIGEST=$(docker buildx imagetools inspect \
              ghcr.io/librepod/marketplace-ui:${TAG} \
              --format '{{.Manifest.Digest}}')
            cosign sign --yes "ghcr.io/librepod/marketplace-ui@${DIGEST}"
          else
            DIGEST=$(docker buildx imagetools inspect \
              ghcr.io/librepod/marketplace-ui:latest \
              --format '{{.Manifest.Digest}}')
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
              "ghcr.io/librepod/marketplace-ui@${DIGEST}"
          fi

  publish-manifests:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Get app version
        id: version
        run: |
          VERSION=$(grep 'version:' apps/marketplace-ui/metadata.yaml \
            | head -1 | sed 's/.*version: *//' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Push and sign manifest artifact
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}"
            echo "Pushing PR artifact..."
            DIGEST=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/marketplace-ui:${TAG} \
              --path=./apps/marketplace-ui \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --ignore-paths=.git/,.gitignore,.gitmodules,.gitattributes,*.jpg,*.jpeg,*.gif,*.png,*.wmv,*.flv,*.tar.gz \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing PR artifact (keyless): $DIGEST"
            cosign sign --yes "$DIGEST"
          else
            echo "Pushing versioned artifact..."
            DIGEST_V=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/marketplace-ui:${{ steps.version.outputs.version }} \
              --path=./apps/marketplace-ui \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --ignore-paths=.git/,.gitignore,.gitmodules,.gitattributes,*.jpg,*.jpeg,*.gif,*.png,*.wmv,*.flv,*.tar.gz \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing versioned artifact: $DIGEST_V"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_V"

            echo "Pushing latest artifact..."
            DIGEST_L=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/apps/marketplace-ui:latest \
              --path=./apps/marketplace-ui \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --ignore-paths=.git/,.gitignore,.gitmodules,.gitattributes,*.jpg,*.jpeg,*.gif,*.png,*.wmv,*.flv,*.tar.gz \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing latest artifact: $DIGEST_L"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_L"
          fi

  comment:
    needs: [publish-image, publish-manifests]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const tag = `pr-${pr_number}`;
            const owner = context.repo.owner;

            const body = `### PR Artifacts Ready

            | Type | Tag |
            |------|-----|
            | Docker image | \`ghcr.io/${owner}/marketplace-ui:${tag}\` |
            | OCI manifest | \`ghcr.io/${owner}/marketplace/apps/marketplace-ui:${tag}\` |

            \`\`\`bash
            # Test in dev cluster:
            flux reconcile source oci <name> --tag ${tag}
            \`\`\``;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr_number,
              body
            });

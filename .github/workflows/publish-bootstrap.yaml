name: Publish Bootstrap Artifact

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [master]
    paths:
      - 'clusters/**'
      - 'infrastructure/**'
  push:
    branches: [master]
    paths:
      - 'clusters/**'
      - 'infrastructure/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: fluxcd/flux2/action@main

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: 'v3.0.6'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "version=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            # Use git tag if available, otherwise short SHA
            TAG=$(git describe --tags --exact-match 2>/dev/null || echo "")
            if [ -n "$TAG" ]; then
              echo "version=$TAG" >> "$GITHUB_OUTPUT"
            else
              echo "version=0.0.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build bootstrap artifact directory
        run: |
          mkdir -p /tmp/bootstrap
          # Copy cluster definitions and infrastructure manifests
          cp -r clusters /tmp/bootstrap/
          cp -r infrastructure /tmp/bootstrap/

      - name: Push and sign bootstrap artifact
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Pushing PR artifact..."
            DIGEST=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/bootstrap:${{ steps.version.outputs.version }} \
              --path=/tmp/bootstrap \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing PR artifact (keyless): $DIGEST"
            cosign sign --yes "$DIGEST"
          else
            echo "Pushing versioned artifact and capture its digest..."
            DIGEST_V=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/bootstrap:${{ steps.version.outputs.version }} \
              --path=/tmp/bootstrap \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing versioned artifact by digest: $DIGEST_V"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_V"

            echo "Pushing latest artifact and capture its digest..."
            DIGEST_L=$(flux push artifact \
              oci://ghcr.io/${{ github.repository_owner }}/marketplace/bootstrap:latest \
              --path=/tmp/bootstrap \
              --source="$(git config --get remote.origin.url)" \
              --revision="$(git rev-parse HEAD)" \
              --output json | jq -r '.repository + "@" + .digest')

            echo "Signing latest artifact by digest: $DIGEST_L"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "$DIGEST_L"
          fi

  comment:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            const tag = `pr-${pr_number}`;
            const owner = context.repo.owner;

            const body = `### PR Bootstrap Artifact Ready

            | Type | Tag |
            |------|-----|
            | OCI bootstrap | \`ghcr.io/${owner}/marketplace/bootstrap:${tag}\` |

            \`\`\`bash
            # Test in dev cluster:
            flux reconcile source oci librepod-bootstrap --tag ${tag}
            \`\`\``;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: pr_number,
              body
            });
